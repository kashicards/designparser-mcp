name: Validate Rules

on:
  pull_request:
    paths:
      - "rules/**"
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "tsconfig.json"
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate rule files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate all rules
        run: npm run validate:built

  lint:
    name: TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
